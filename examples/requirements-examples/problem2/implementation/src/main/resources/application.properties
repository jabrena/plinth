# Greek Gods REST Client
quarkus.rest-client.greek-gods-api.url=https://my-json-server.typicode.com
quarkus.rest-client.greek-gods-api.connect-timeout=5000
quarkus.rest-client.greek-gods-api.read-timeout=5000

# Wikipedia REST Client
quarkus.rest-client.wikipedia-api.url=https://en.wikipedia.org
quarkus.rest-client.wikipedia-api.connect-timeout=5000
quarkus.rest-client.wikipedia-api.read-timeout=5000

# Test profile overrides (WireMock)
%test.quarkus.rest-client.greek-gods-api.url=http://localhost:${wiremock.port}
%test.quarkus.rest-client.wikipedia-api.url=http://localhost:${wiremock.port}
%test.quarkus.rest-client.greek-gods-api.read-timeout=2000
%test.quarkus.rest-client.wikipedia-api.read-timeout=2000

# Logging
quarkus.log.category."info.jab.ms".level=DEBUG

# Test profile logging - reduce noise for tests
%test.quarkus.log.category."info.jab.ms.service".level=WARN
%test.quarkus.log.category."info.jab.ms.rest".level=WARN
%test.quarkus.log.category."org.eclipse.jetty".level=WARN
%test.quarkus.log.category."com.github.tomakehurst.wiremock".level=WARN
%test.quarkus.log.category."io.quarkus".level=WARN
%test.quarkus.log.level=WARN
