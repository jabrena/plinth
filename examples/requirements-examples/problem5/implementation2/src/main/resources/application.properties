quarkus.application.name=greek-gods-api

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Upstream JSON server (path /greek is on the REST client interface)
quarkus.rest-client.greek-gods-upstream-api.url=${GREEK_GODS_UPSTREAM_BASE_URL:https://my-json-server.typicode.com/jabrena/latency-problems}
quarkus.rest-client.greek-gods-upstream-api.scope=jakarta.inject.Singleton

# Background sync (override in tests)
greek.gods.sync.every=${GREEK_GODS_SYNC_EVERY:1h}

# OpenAPI (align with greekController-oas.yaml)
quarkus.smallrye-openapi.info-title=Greek Gods REST API
quarkus.smallrye-openapi.info-description=API for retrieving information about Greek gods
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-contact-name=Juan Antonio Brena Moral
quarkus.smallrye-openapi.info-contact-email=my@email.com
quarkus.smallrye-openapi.info-license-name=Apache 2.0
quarkus.smallrye-openapi.info-license-url=https://www.apache.org/licenses/LICENSE-2.0
