openapi: 3.0.3
info:
  title: God Analysis API
  description: |
    Cross-pantheon god name analysis: loads god lists from configured sources (Greek, Roman, Nordic),
    applies a case-sensitive name prefix filter, converts each matching name to a decimal string by
    concatenating Unicode code point values per character, then returns the sum of those values.

    **Processing rules** (from requirements):
    - **Decimal conversion:** For each character in a name, use its Unicode integer value and concatenate
      those digits as a string (e.g. `Zeus` → `90101117115`), then contribute that string's numeric value to the total.
    - **Filter:** `filter` is case-sensitive; only names whose first character exactly matches the filter
      character are included (e.g. `filter=n` matches `n…`; `filter=N` matches no names in the documented scenarios).
    - **Timeouts:** External source calls use a configured timeout (e.g. 5 seconds). If a source times out,
      the aggregate is computed from the remaining sources only (HTTP 200 with partial logical result).
    - **Authentication:** Public API; no authentication required.

    **External data sources** (implementation detail; not part of this contract):
    - Greek: `https://my-json-server.typicode.com/jabrena/latency-problems/greek`
    - Roman: `https://my-json-server.typicode.com/jabrena/latency-problems/roman`
    - Nordic: `https://my-json-server.typicode.com/jabrena/latency-problems/nordic`
  version: 1.0.0

servers:
  - url: https://api.example.com
    description: Replace with deployment base URL
  - url: http://localhost:8080
    description: Local development (typical default)

security: []

tags:
  - name: gods
    description: Operations for god-name analysis and aggregate statistics.

paths:
  /api/v1/gods/stats/sum:
    get:
      operationId: getGodsStatsSum
      summary: Sum of Unicode-derived decimal values for filtered god names
      description: |
        Returns a JSON object with a single field `sum` containing the aggregated result as a decimal string.
        Large results may exceed 64-bit integer range in plain JSON numbers; the value is therefore represented as a string.
      tags:
        - gods
      parameters:
        - name: filter
          in: query
          required: true
          description: |
            Single-character prefix applied to the start of each god name. Matching is case-sensitive.
          schema:
            type: string
            minLength: 1
            maxLength: 1
          example: "n"
        - name: sources
          in: query
          required: true
          description: |
            Comma-separated list of pantheon sources to include.
            Allowed values: `greek`, `roman`, `nordic`.
            The aggregate is computed over all gods retrieved from the selected sources after filtering.
          style: form
          explode: false
          schema:
            type: array
            minItems: 1
            uniqueItems: true
            items:
              $ref: "#/components/schemas/PantheonSource"
          example:
            - greek
            - roman
            - nordic
      responses:
        "200":
          description: |
            Successful computation. When no names match the filter, `sum` is `"0"`.
            When a source times out, the service still responds with 200 and `sum` reflects only data from sources that responded in time.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GodStatsSumResponse"
              examples:
                happyPath:
                  summary: Acceptance test — filter n, all three sources
                  value:
                    sum: "78179288397447443426"
                uppercaseFilterNoMatch:
                  summary: Case-sensitive filter N — no lowercase-n names
                  value:
                    sum: "0"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

components:
  responses:
    BadRequestResponse:
      description: Malformed request (e.g. missing query parameters, invalid filter length, invalid source value).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidFilterLength:
              summary: Filter must be exactly one character
              value:
                code: INVALID_FILTER
                message: "Query parameter 'filter' must contain exactly one character."
            invalidSource:
              summary: Unsupported source in sources list
              value:
                code: INVALID_SOURCE
                message: "Query parameter 'sources' contains unsupported value: 'egyptian'."
    InternalServerErrorResponse:
      description: Unexpected server failure. Not specified in acceptance tests; clients may treat as retryable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: INTERNAL_ERROR
            message: "Unexpected error while computing aggregate."
  schemas:
    PantheonSource:
      type: string
      enum:
        - greek
        - roman
        - nordic
      description: Supported external pantheon source identifier.
    GodStatsSumResponse:
      type: object
      required:
        - sum
      properties:
        sum:
          type: string
          pattern: "^[0-9]+$"
          description: |
            Non-negative integer represented as a decimal string. Using string avoids JSON number precision issues for very large aggregates.
          example: "78179288397447443426"
    ErrorResponse:
      type: object
      description: Error response envelope.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
          example: INVALID_FILTER
        message:
          type: string
          description: Human-readable error detail.
          example: "Query parameter 'filter' must contain exactly one character."
        details:
          type: object
          description: Optional structured metadata about the validation or runtime error.
          additionalProperties: true
